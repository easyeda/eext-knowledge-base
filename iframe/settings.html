<!doctype html>
<html lang="zh-Hans">
<head>
	<title>设置</title>
	<meta charset="utf-8" />
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
		h2 { font-size: 16px; color: #333; margin-bottom: 16px; }
		.field { margin-bottom: 12px; }
		.field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
		.field input, .field select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none; background: #fff; }
		.field input:focus, .field select:focus { border-color: #4a90d9; }
		.field .hint { font-size: 11px; color: #999; margin-top: 2px; }
		.actions { margin-top: 16px; display: flex; gap: 8px; }
		.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
		.btn-primary { background: #4a90d9; color: #fff; }
		.btn-primary:hover { background: #357abd; }
		#status { margin-top: 8px; font-size: 12px; color: #28a745; min-height: 18px; }
	</style>
</head>
<body>
	<h2>⚙️ AI 助手设置</h2>
	<div class="field">
		<label>API 类型</label>
		<select id="cfg-apitype">
			<option value="openai">OpenAI 兼容格式（MiniMax、DeepSeek 等）</option>
			<option value="anthropic">Anthropic 格式（Claude 等）</option>
		</select>
	</div>
	<div class="field">
		<label>API Key</label>
		<input type="password" id="cfg-apikey" placeholder="输入 API Key" />
	</div>
	<div class="field">
		<label>模型名称</label>
		<input type="text" id="cfg-model" placeholder="输入模型名称" />
	</div>
	<div class="field">
		<label>API 地址</label>
		<input type="text" id="cfg-baseurl" placeholder="例如 https://api.openai.com/v1" />
	</div>
	<div class="field">
		<label>模型镜像站</label>
		<input type="text" id="cfg-modelmirror" placeholder="例如 https://huggingface.co" />
		<div class="hint">用于下载 Embedding 模型，留空则使用默认镜像站 https://hf-mirror.com</div>
	</div>
	<div class="actions">
		<button class="btn btn-primary" id="save-btn">💾 保存</button>
	</div>
	<div id="status"></div>
	<script>
		var STORAGE_KEY = 'ai_assistant_config';
		var cfgApiType = document.getElementById('cfg-apitype');
		var cfgApiKey = document.getElementById('cfg-apikey');
		var cfgModel = document.getElementById('cfg-model');
		var cfgBaseURL = document.getElementById('cfg-baseurl');
		var cfgModelMirror = document.getElementById('cfg-modelmirror');
		var saveBtn = document.getElementById('save-btn');
		var statusEl = document.getElementById('status');

		// 加载
		try {
			var raw = localStorage.getItem(STORAGE_KEY);
			if (raw) {
				var obj = JSON.parse(raw);
				cfgApiType.value = obj.apiType || 'openai';
				cfgApiKey.value = obj.apiKey || '';
				cfgModel.value = obj.model || '';
				cfgBaseURL.value = obj.baseURL || '';
				cfgModelMirror.value = obj.modelMirror || '';
			}
		} catch(e) {}

		// 保存
		saveBtn.addEventListener('click', function() {
			var config = {
				apiType: cfgApiType.value,
				apiKey: cfgApiKey.value.trim(),
				model: cfgModel.value.trim(),
				baseURL: cfgBaseURL.value.trim(),
				modelMirror: cfgModelMirror.value.trim(),
			};
			localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
			statusEl.textContent = '✅ 已保存，重新打开助手窗口生效';
			setTimeout(function() { statusEl.textContent = ''; }, 3000);
			try {
				eda.sys_Message.showToastMessage('设置已保存，重新打开助手窗口生效',"success", 3);
			} catch(e) {}
		});
	</script>
</body>
</html>
