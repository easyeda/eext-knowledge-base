<!doctype html>
<html lang="zh-Hans">
<head>
	<title>设置</title>
	<meta charset="utf-8" />
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }
		body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; padding: 20px; }
		h2 { font-size: 16px; color: #333; margin-bottom: 16px; }
		.field { margin-bottom: 12px; }
		.field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
		.field input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none; }
		.field input:focus { border-color: #4a90d9; }
		.field .hint { font-size: 11px; color: #999; margin-top: 2px; }
		.actions { margin-top: 16px; display: flex; gap: 8px; }
		.btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; }
		.btn-primary { background: #4a90d9; color: #fff; }
		.btn-primary:hover { background: #357abd; }
		#status { margin-top: 8px; font-size: 12px; color: #28a745; min-height: 18px; }
	</style>
</head>
<body>
	<h2>⚙️ AI 助手设置</h2>
	<div class="field">
		<label>API Key</label>
		<input type="password" id="cfg-apikey" placeholder="输入 MiniMax API Key" />
	</div>
	<div class="field">
		<label>模型名称</label>
		<input type="text" id="cfg-model" value="MiniMax-M2.5" />
	</div>
	<div class="field">
		<label>API 地址</label>
		<input type="text" id="cfg-baseurl" value="https://api.minimaxi.com/v1" />
	</div>
	<div class="field">
		<label>Embedding 模型加载地址</label>
		<input type="text" id="cfg-model-host" value="https://hf-mirror.com" />
		<div class="hint">HuggingFace 镜像站，国内推荐 https://hf-mirror.com</div>
	</div>
	<div class="actions">
		<button class="btn btn-primary" id="save-btn">💾 保存</button>
	</div>
	<div id="status"></div>
	<script>
		var STORAGE_KEY = 'ai_assistant_config';
		var cfgApiKey = document.getElementById('cfg-apikey');
		var cfgModel = document.getElementById('cfg-model');
		var cfgBaseURL = document.getElementById('cfg-baseurl');
		var cfgModelHost = document.getElementById('cfg-model-host');
		var saveBtn = document.getElementById('save-btn');
		var status = document.getElementById('status');

		// 加载
		try {
			var raw = localStorage.getItem(STORAGE_KEY);
			if (raw) {
				var obj = JSON.parse(raw);
				cfgApiKey.value = obj.apiKey || '';
				cfgModel.value = obj.model || 'MiniMax-M2.5';
				cfgBaseURL.value = obj.baseURL || 'https://api.minimaxi.com/v1';
				cfgModelHost.value = obj.modelHost || 'https://hf-mirror.com';
			}
		} catch(e) {}

		// 保存
		saveBtn.addEventListener('click', function() {
			var config = {
				apiKey: cfgApiKey.value.trim(),
				model: cfgModel.value.trim() || 'MiniMax-M2.5',
				baseURL: cfgBaseURL.value.trim() || 'https://api.minimaxi.com/v1',
				modelHost: cfgModelHost.value.trim() || 'https://hf-mirror.com',
			};
			localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
			status.textContent = '✅ 已保存，重新打开助手窗口生效';
			setTimeout(function() { status.textContent = ''; }, 3000);
		});
	</script>
</body>
</html>
