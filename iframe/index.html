<!doctype html>
<html lang="zh-Hans">
<head>
	<title>AI 知识库助手</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<link rel="stylesheet" href="/iframe/style.css" />
</head>
<body>
	<div id="app">
		<div id="sidebar">
			<h3>📚 知识库</h3>
			<div id="upload-area">
				<label for="file-input" class="upload-btn">📄 导入 Markdown 文件</label>
				<input type="file" id="file-input" accept=".md,.markdown,.txt" multiple />
			</div>
			<div id="doc-list"></div>
			<div id="doc-stats"></div>
			<button id="clear-kb" class="btn-danger" style="display:none;">清空知识库</button>
		</div>
		<div id="main">
			<div id="chat-messages"></div>
			<div id="input-area">
				<textarea id="user-input" placeholder="输入你的问题..." rows="2"></textarea>
				<button id="send-btn">发送</button>
			</div>
		</div>
	</div>
	<script src="/iframe/app.js"></script>
</body>
</html>
